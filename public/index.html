<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的博客</title>
  <link rel="stylesheet" href="/css/style.css?v=6">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-inner">
        <div class="site-title" onclick="switchTab('personal')">我的博客</div>
        <nav id="tab-nav">
          <button class="tab-btn active" data-section="personal">📋 个人信息</button>
          <button class="tab-btn" data-section="movies">🎬 观影指南</button>
          <button class="tab-btn" data-section="books">📖 读书笔记</button>
          <button class="tab-btn" data-section="music">🎵 音乐收藏</button>
          <button class="tab-btn" data-section="memos">📝 备忘录</button>
          <button class="tab-btn" data-section="guestbook">💬 留言板</button>
          <button class="tab-btn admin-only" data-section="admin" style="display:none">🔧 管理后台</button>
        </nav>
        <div id="auth-area">
          <button id="login-btn" class="btn btn-sm btn-outline" onclick="showModal('login')">登录</button>
          <button id="register-btn" class="btn btn-sm btn-primary" onclick="showModal('register')">注册</button>
          <div id="user-menu" style="display:none">
            <span id="user-name"></span>
            <button class="btn btn-sm btn-outline" onclick="logout()">退出</button>
          </div>
        </div>
      </div>
    </header>

    <div class="layout-container">
      <aside id="sidebar">
        <div class="sidebar-card profile-card" id="profile-display">
          <div class="avatar-wrapper">
            <img id="avatar-img" src="" alt="avatar">
          </div>
          <h3 id="nickname-display">加载中...</h3>
          <p id="signature-display">加载中...</p>
          <button class="btn btn-sm btn-outline edit-profile-btn" id="edit-profile-btn" style="display:none">编辑资料</button>
        </div>
        <div class="sidebar-card profile-card" id="profile-editor" style="display:none">
          <div class="form-group">
            <label>头像URL</label>
            <input type="text" id="edit-avatar" placeholder="输入头像图片URL">
          </div>
          <div class="form-group">
            <label>昵称</label>
            <input type="text" id="edit-nickname" placeholder="输入昵称">
          </div>
          <div class="form-group">
            <label>个性签名</label>
            <textarea id="edit-signature" rows="2" placeholder="输入个性签名"></textarea>
          </div>
          <div class="editor-actions">
            <button class="btn btn-primary btn-sm" onclick="saveProfile()">保存</button>
            <button class="btn btn-outline btn-sm" onclick="cancelProfileEdit()">取消</button>
          </div>
        </div>
        <div class="sidebar-card calendar-card">
          <div class="calendar-header">
            <div class="calendar-date-main">
              <span class="calendar-day" id="cal-day">01</span>
            </div>
            <div class="calendar-info" id="cal-info">
              <span class="calendar-month-year" id="cal-month-year">2024年1月</span>
              <span class="cal-dot">·</span>
              <span class="calendar-weekday" id="cal-weekday">星期一</span>
              <span class="cal-dot">·</span>
              <span class="calendar-week-number" id="cal-week">第 1 周</span>
            </div>
          </div>
          <div class="calendar-divider"></div>
          <div class="calendar-lunar">
            <span class="cal-label">农历</span>
            <span id="cal-lunar">冬月廿一</span>
          </div>
          <div class="calendar-festivals" id="cal-festivals"></div>
        </div>
      </aside>
      <main id="main-content">
        <div id="content-area">
          <div class="content-card" id="section-personal">
            <div class="content-header">
              <h2>个人信息<span class="perm-badge" id="perm-personal"></span></h2>
              <button class="btn btn-sm btn-primary edit-btn" data-section="personal" style="display:none">编辑</button>
            </div>
            <div class="content-body" id="body-personal">
              <div class="skeleton-wrapper"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line"></div></div>
            </div>
            <div class="content-editor" id="editor-personal" style="display:none">
              <input type="text" class="editor-title" id="title-personal" placeholder="标题">
              <textarea class="editor-body" id="body-editor-personal" placeholder="支持HTML内容编辑"></textarea>
              <div class="editor-actions">
                <button class="btn btn-primary" onclick="saveContent('personal')">保存</button>
                <button class="btn btn-outline" onclick="cancelEdit('personal')">取消</button>
                <div class="editor-permission">
                  <label>权限</label>
                  <select id="perm-select-personal">
                    <option value="guest">游客可见</option>
                    <option value="user">登录用户可见</option>
                    <option value="admin">管理员可见</option>
                  </select>
                </div>
                <label class="format-toggle" title="用Markdown语法编辑">
                  <input type="checkbox" id="format-toggle-personal">
                  <span>MD</span>
                </label>
              </div>
            </div>
          </div>

          <div class="content-card" id="section-movies">
            <div class="content-header">
              <h2>观影指南<span class="perm-badge" id="perm-movies"></span></h2>
              <button class="btn btn-sm btn-primary edit-btn" data-section="movies" style="display:none">编辑</button>
            </div>
            <div class="content-body" id="body-movies">
              <div class="skeleton-wrapper"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line"></div></div>
            </div>
            <div class="content-editor" id="editor-movies" style="display:none">
              <input type="text" class="editor-title" id="title-movies" placeholder="标题">
              <textarea class="editor-body" id="body-editor-movies" placeholder="支持HTML内容编辑"></textarea>
              <div class="editor-actions">
                <button class="btn btn-primary" onclick="saveContent('movies')">保存</button>
                <button class="btn btn-outline" onclick="cancelEdit('movies')">取消</button>
                <div class="editor-permission">
                  <label>权限</label>
                  <select id="perm-select-movies">
                    <option value="guest">游客可见</option>
                    <option value="user">登录用户可见</option>
                    <option value="admin">管理员可见</option>
                  </select>
                </div>
                <label class="format-toggle" title="用Markdown语法编辑">
                  <input type="checkbox" id="format-toggle-movies">
                  <span>MD</span>
                </label>
              </div>
            </div>
          </div>

          <div class="content-card" id="section-books">
            <div class="content-header">
              <h2>读书笔记<span class="perm-badge" id="perm-books"></span></h2>
              <button class="btn btn-sm btn-primary edit-btn" data-section="books" style="display:none">编辑</button>
            </div>
            <div class="content-body" id="body-books">
              <div class="skeleton-wrapper"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line"></div></div>
            </div>
            <div class="content-editor" id="editor-books" style="display:none">
              <input type="text" class="editor-title" id="title-books" placeholder="标题">
              <textarea class="editor-body" id="body-editor-books" placeholder="支持HTML内容编辑"></textarea>
              <div class="editor-actions">
                <button class="btn btn-primary" onclick="saveContent('books')">保存</button>
                <button class="btn btn-outline" onclick="cancelEdit('books')">取消</button>
                <div class="editor-permission">
                  <label>权限</label>
                  <select id="perm-select-books">
                    <option value="guest">游客可见</option>
                    <option value="user">登录用户可见</option>
                    <option value="admin">管理员可见</option>
                  </select>
                </div>
                <label class="format-toggle" title="用Markdown语法编辑">
                  <input type="checkbox" id="format-toggle-books">
                  <span>MD</span>
                </label>
              </div>
            </div>
          </div>

          <div class="content-card" id="section-music">
            <div class="content-header">
              <h2>音乐收藏<span class="perm-badge" id="perm-music"></span></h2>
              <button class="btn btn-sm btn-primary edit-btn" data-section="music" style="display:none">编辑</button>
            </div>
            <div class="content-body" id="body-music">
              <div class="skeleton-wrapper"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line"></div></div>
            </div>
            <div class="content-editor" id="editor-music" style="display:none">
              <input type="text" class="editor-title" id="title-music" placeholder="标题">
              <textarea class="editor-body" id="body-editor-music" placeholder="支持HTML内容编辑"></textarea>
              <div class="editor-actions">
                <button class="btn btn-primary" onclick="saveContent('music')">保存</button>
                <button class="btn btn-outline" onclick="cancelEdit('music')">取消</button>
                <div class="editor-permission">
                  <label>权限</label>
                  <select id="perm-select-music">
                    <option value="guest">游客可见</option>
                    <option value="user">登录用户可见</option>
                    <option value="admin">管理员可见</option>
                  </select>
                </div>
                <label class="format-toggle" title="用Markdown语法编辑">
                  <input type="checkbox" id="format-toggle-music">
                  <span>MD</span>
                </label>
              </div>
            </div>
          </div>

          <div class="content-card" id="section-memos">
            <div class="content-header">
              <h2>备忘录<span class="perm-badge" id="perm-memos"></span></h2>
              <button class="btn btn-sm btn-primary edit-btn" data-section="memos" style="display:none">编辑</button>
            </div>
            <div class="content-body" id="body-memos">
              <div class="skeleton-wrapper"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line"></div></div>
            </div>
            <div class="content-editor" id="editor-memos" style="display:none">
              <input type="text" class="editor-title" id="title-memos" placeholder="标题">
              <textarea class="editor-body" id="body-editor-memos" placeholder="支持HTML内容编辑"></textarea>
              <div class="editor-actions">
                <button class="btn btn-primary" onclick="saveContent('memos')">保存</button>
                <button class="btn btn-outline" onclick="cancelEdit('memos')">取消</button>
                <div class="editor-permission">
                  <label>权限</label>
                  <select id="perm-select-memos">
                    <option value="guest">游客可见</option>
                    <option value="user">登录用户可见</option>
                    <option value="admin">管理员可见</option>
                  </select>
                </div>
                <label class="format-toggle" title="用Markdown语法编辑">
                  <input type="checkbox" id="format-toggle-memos">
                  <span>MD</span>
                </label>
              </div>
            </div>
          </div>

          <div class="content-card" id="section-guestbook">
            <div class="content-header">
              <h2>💬 留言板<span class="perm-badge" id="perm-guestbook"></span></h2>
              <button class="btn btn-sm btn-primary edit-btn" data-section="guestbook" style="display:none">编辑</button>
            </div>
            <div class="content-body" id="body-guestbook">
              <div class="skeleton-wrapper"><div class="skeleton skeleton-line"></div></div>
            </div>
            <div class="content-editor" id="editor-guestbook" style="display:none">
              <input type="text" class="editor-title" id="title-guestbook" placeholder="标题">
              <textarea class="editor-body" id="body-editor-guestbook" placeholder="支持HTML内容编辑"></textarea>
              <div class="editor-actions">
                <button class="btn btn-primary" onclick="saveContent('guestbook')">保存</button>
                <button class="btn btn-outline" onclick="cancelEdit('guestbook')">取消</button>
                <div class="editor-permission">
                  <label>权限</label>
                  <select id="perm-select-guestbook">
                    <option value="guest">游客可见</option>
                    <option value="user">登录用户可见</option>
                    <option value="admin">管理员可见</option>
                  </select>
                </div>
                <label class="format-toggle" title="用Markdown语法编辑">
                  <input type="checkbox" id="format-toggle-guestbook">
                  <span>MD</span>
                </label>
              </div>
            </div>
            <div class="guestbook-post" id="guestbook-post-area">
              <textarea id="guestbook-input" rows="3" placeholder="说点什么吧..." maxlength="1000"></textarea>
              <div class="guestbook-post-actions">
                <span class="guestbook-hint" id="guestbook-hint">登录后可留言</span>
                <button class="btn btn-primary btn-sm" id="guestbook-submit" onclick="postGuestbook()" disabled>发布</button>
              </div>
            </div>
            <div class="guestbook-list" id="guestbook-list">
              <div class="skeleton-wrapper"><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line"></div></div>
            </div>
          </div>

          <div class="content-card" id="section-admin">
            <div class="content-header">
              <h2>管理后台</h2>
            </div>
            <div class="admin-panel">
              <div class="admin-section">
                <h3>用户管理</h3>
                <div class="table-wrapper">
                  <table id="users-table">
                    <thead>
                      <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>角色</th>
                        <th>状态</th>
                        <th>注册时间</th>
                        <th>操作</th>
                      </tr>
                    </thead>
                    <tbody id="users-tbody"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <footer id="footer">
      <p>&copy; 2026 我的博客 - Powered by Cloudflare</p>
    </footer>
  </div>

  <div id="modal-overlay" style="display:none" onclick="closeModal(event)">
    <div class="modal" id="auth-modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modal-title">登录</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div id="login-form">
          <div class="form-group">
            <label>用户名</label>
            <input type="text" id="login-username" placeholder="请输入用户名">
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="login-password" placeholder="请输入密码">
          </div>
          <div class="form-error" id="login-error"></div>
          <button class="btn btn-primary btn-full" onclick="login()">登录</button>
          <p class="form-switch">还没有账号？<a href="#" onclick="switchAuthForm('register')">立即注册</a></p>
        </div>
        <div id="register-form" style="display:none">
          <div class="form-group">
            <label>用户名</label>
            <input type="text" id="register-username" placeholder="请输入用户名（至少2个字符）">
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="register-password" placeholder="请输入密码">
          </div>
          <div class="form-group">
            <label>确认密码</label>
            <input type="password" id="register-confirm" placeholder="请再次输入密码">
          </div>
          <div class="form-error" id="register-error"></div>
          <button class="btn btn-primary btn-full" onclick="register()">注册</button>
          <p class="form-switch">已有账号？<a href="#" onclick="switchAuthForm('login')">立即登录</a></p>
        </div>
        <div id="register-success" style="display:none">
          <div class="success-message">
            <p id="register-success-msg"></p>
          </div>
          <button class="btn btn-primary btn-full" onclick="closeModal()">确定</button>
        </div>
      </div>
    </div>
  </div>

<button id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="回到顶部">↑</button>
<script src="/js/lib/marked.min.js"></script>
<script src="/js/app.js?v=6"></script>
</body>
</html>
